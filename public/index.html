<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saç Karnesi</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:24px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
box-sizing:border-box;
border:1px solid #ddd;
border-radius:12px;
}

button{
width:100%;
padding:15px;
background:black;
color:white;
border:none;
border-radius:14px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.result{
display:none;
margin-top:24px;
}

.hero-score{
background:#fff;
border-radius:24px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:20px;
}

.score-ring{
width:170px;
height:170px;
border-radius:50%;
margin:20px auto 10px;
display:flex;
align-items:center;
justify-content:center;
background:conic-gradient(#111 0deg, #eee 0deg);
}

.score-inner{
width:125px;
height:125px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.score-number{
font-size:42px;
font-weight:bold;
}

.category{
font-size:20px;
color:#666;
}

.age-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.card,.age-diff-card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
text-align:center;
}

.age-diff-card{
margin-bottom:20px;
}

.age-diff-number{
font-size:42px;
font-weight:bold;
}

.section{
background:#f7f7f7;
padding:18px;
border-radius:18px;
margin-top:16px;
}

.metric{
margin-bottom:16px;
}

.metric-name{
font-size:14px;
color:#666;
margin-bottom:4px;
}

.metric-bar{
height:10px;
background:#eee;
border-radius:20px;
overflow:hidden;
}

.metric-fill{
height:10px;
background:black;
}
</style>
</head>

<body>

<div class="container">

<h1>Saç Karnesi</h1>
<p>Saç derinizin görünümünü ve bakım ihtiyaçlarını analiz edin.</p>

<form id="analysisForm">
<label>Ad Soyad</label>
<input type="text" name="fullName" required>

<label>Telefon</label>
<input type="tel" name="phone" required>

<label>E-posta</label>
<input type="email" name="email">

<label>Yaş</label>
<input type="number" name="age" required>

<label>Cinsiyet</label>
<select name="gender">
<option>Erkek</option>
<option>Kadın</option>
</select>

<label>Saç Yıkama Sıklığı</label>
<select name="washing">
<option>Haftada 1-2</option>
<option>Haftada 3-4</option>
<option>Haftada 5+</option>
</select>

<label>Kepek / Pullanma</label>
<select name="flaking">
<option>Yok</option>
<option>Ara sıra</option>
<option>Sık</option>
</select>

<label>Saç Derisi Hissi</label>
<select name="scalpFeeling">
<option>Normal</option>
<option>Kuru</option>
<option>Yağlı</option>
<option>Hassas</option>
</select>

<label>Son 12 Ayda Dökülme</label>
<select name="shedding">
<option>Hayır</option>
<option>Biraz</option>
<option>Belirgin</option>
</select>

<label>Saç Ekimi</label>
<select name="transplant">
<option>Hayır</option>
<option>Son 1 yıl</option>
<option>1 yıldan eski</option>
</select>

<label>Düzenli Ürün Kullanımı</label>
<select name="routine">
<option>Hayır</option>
<option>Evet</option>
</select>

<label>Ön Saç Çizgisi Fotoğrafı</label>
<input type="file" name="front" accept="image/*" required>

<label>Tepe Bölgesi Fotoğrafı</label>
<input type="file" name="crown" accept="image/*" required>

<label>Yakın Plan Saç Derisi Fotoğrafı</label>
<input type="file" name="closeup" accept="image/*" required>

<button type="submit">Analize Başla</button>
</form>

<div class="result" id="resultBox">

<div class="hero-score">
<div style="font-size:14px;letter-spacing:2px;color:#777;">SCALP SCORE</div>

<div class="score-ring" id="scoreRing">
<div class="score-inner">
<div class="score-number" id="score"></div>
<div style="font-size:12px;color:#777;">/100</div>
</div>
</div>

<div class="category" id="category"></div>
</div>
<div class="section" id="statusCard"></div>

<div class="age-grid">

<div class="card">
<div>Scalp Score</div>
<h2 id="scoreCard"></h2>
</div>

<div class="card">
<div>Saç Yaşı</div>
<h2 id="hairAge"></h2>
</div>

<div class="card">
<div>Yaş Farkı</div>
<h2 id="ageDiff"></h2>
</div>

<div class="card">
<div>Analiz Güveni</div>
<h2 id="confidence"></h2>
</div>

</div>
<div class="card">
<div>Gerçek Yaş</div>
<h2 id="realAge"></h2>
</div>

<div class="card">
<div>Saç Yaşı</div>
<h2 id="hairAge"></h2>
</div>
</div>

<div class="age-diff-card">
<div>Saç Yaşı Farkı</div>
<div class="age-diff-number" id="ageDiff"></div>
</div>

<div class="section">
<h3>Saç Sağlığı Haritası</h3>
<div id="metrics"></div>
</div>

<div class="section">
<h3>Odak Alanları</h3>
<ul id="focusList"></ul>
</div>

<div class="section">
<h3>Özet</h3>
<p id="summary"></p>
<p style="font-size:12px;color:#777;" id="note"></p>
</div>

<button onclick="window.location.href='/care-plan.html'">30 Günlük Bakım Planımı Gör</button>
<button onclick="window.location.href='/download-pdf'">PDF Raporunu İndir</button>
<button onclick="window.open('https://wa.me/905435998684?text=Merhaba,%20Sa%C3%A7%20Karnesi%20analizimi%20ald%C4%B1m.%20Sonucum%20hakk%C4%B1nda%20bilgi%20almak%20istiyorum.', '_blank')">WhatsApp Uzman Destek</button>

</div>

</div>

<script>
const form = document.getElementById("analysisForm");

form.addEventListener("submit", async (e)=>{
e.preventDefault();

const button = form.querySelector("button");
button.innerText = "Analiz ediliyor...";
button.disabled = true;

const formData = new FormData(form);

try{
const response = await fetch("/analyze",{
method:"POST",
body:formData
});

const result = await response.json();

if(result.error){
alert(result.error);
button.innerText = "Analize Başla";
button.disabled = false;
return;
}

const scoreValue = result.scalp_score ?? 0;
const degree = scoreValue * 3.6;

let scoreColor = "#111";
if(scoreValue < 50){
scoreColor = "#c0392b";
}else if(scoreValue < 70){
scoreColor = "#d9822b";
}else if(scoreValue < 85){
scoreColor = "#2e7d32";
}else{
scoreColor = "#14532d";
}
let statusText = "";

if(scoreValue < 50){
statusText =
"Saç derinizde bakım ihtiyacına işaret eden bulgular mevcut.";
}
else if(scoreValue < 70){
statusText =
"Saç deriniz genel olarak dengeli ancak gelişime açık alanlar bulunuyor.";
}
else{
statusText =
"Saç deriniz genel olarak sağlıklı ve dengeli görünüyor.";
}

document.getElementById("statusCard").innerHTML =
`
<h3>Genel Değerlendirme</h3>
<p>${statusText}</p>
`;

document.getElementById("score").innerText = scoreValue;
document.getElementById("scoreCard").innerText =
scoreValue;
document.getElementById("scoreRing").style.background =
`conic-gradient(${scoreColor} ${degree}deg, #eee ${degree}deg)`;

document.getElementById("category").innerText = result.score_category ?? "";
document.getElementById("realAge").innerText = formData.get("age");
document.getElementById("hairAge").innerText = result.hair_age ?? "-";
document.getElementById("summary").innerText = result.user_friendly_summary ?? "";
document.getElementById("confidence").innerText =
(result.confidence_score ?? 80) + "%";
document.getElementById("note").innerText = result.safety_note ?? "";

const realAge = Number(formData.get("age"));
const hairAge = Number(result.hair_age);
const diff = hairAge - realAge;
const ageDiffEl = document.getElementById("ageDiff");

if(diff > 0){
ageDiffEl.innerText = "+" + diff + " yıl";
ageDiffEl.style.color = "#c0392b";
}else if(diff < 0){
ageDiffEl.innerText = diff + " yıl";
ageDiffEl.style.color = "#2e7d32";
}else{
ageDiffEl.innerText = "0 yıl";
ageDiffEl.style.color = "#111";
}

const metrics = document.getElementById("metrics");

metrics.innerHTML = `
<div class="metric"><div class="metric-name">Yoğunluk: ${result.density_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.density_score ?? 0}%"></div></div></div>
<div class="metric"><div class="metric-name">Nem Dengesi: ${result.moisture_balance_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.moisture_balance_score ?? 0}%"></div></div></div>
<div class="metric"><div class="metric-name">Yağ Dengesi: ${result.oil_balance_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.oil_balance_score ?? 0}%"></div></div></div>
<div class="metric"><div class="metric-name">Pullanma: ${result.flaking_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.flaking_score ?? 0}%"></div></div></div>
<div class="metric"><div class="metric-name">Hassasiyet: ${result.sensitivity_redness_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.sensitivity_redness_score ?? 0}%"></div></div></div>
<div class="metric"><div class="metric-name">Bakım Rutini: ${result.routine_score ?? "-"} / 100</div><div class="metric-bar"><div class="metric-fill" style="width:${result.routine_score ?? 0}%"></div></div></div>
`;

const focusList = document.getElementById("focusList");
focusList.innerHTML = "";

const focusAreas = result.top_focus_areas || result.recommended_focus || [];

focusAreas.slice(0,3).forEach(item=>{
const li = document.createElement("li");
li.innerText = item;
focusList.appendChild(li);
});

document.getElementById("resultBox").style.display="block";

button.innerText="Tekrar Analiz Et";
button.disabled = false;

}catch(err){
alert("Analiz sırasında hata oluştu");
console.error(err);
button.innerText="Analize Başla";
button.disabled = false;
}
});
</script>

</body>
</html>
